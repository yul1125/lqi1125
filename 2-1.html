<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagea 2-1 音樂庫</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           一、視覺核心：漸層背景與色彩系統
        ========================================== */
        body {
            background: linear-gradient(180deg, #0f1115 0%, #0c0e12 100%);
            background-attachment: fixed; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            color: #e6e6e6;
            margin: 0;
            padding: 48px 32px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto;
        }

        /* ==========================================
           二、字體層級系統與導航按鈕
        ========================================== */
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 1px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .back-btn { 
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e6e6e6; 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            margin-bottom: 24px; 
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .back-btn:hover { 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff; 
            transform: translateX(-4px); 
        }

        /* ==========================================
           三、琉璃播放器區塊
        ========================================== */
        .playlist-box { 
            background: rgba(26, 29, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            padding: 32px; 
        }

        .player-header { 
            position: sticky; 
            top: 20px; 
            background: rgba(26, 29, 36, 0.85); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px; 
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #now-playing { 
            color: #A8C7E0; 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 12px; 
            display: block; 
            letter-spacing: 0.5px;
        }

        audio { 
            width: 100%; 
            border-radius: 8px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1E2128; 
        }

        /* ==========================================
           四、極簡列表按鈕
        ========================================== */
        .song-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        .song-item { 
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            background-color: transparent; 
            border: 1px solid transparent;
            border-radius: 10px;
            color: #e6e6e6;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .song-item:hover { 
            background-color: rgba(255, 255, 255, 0.03); 
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateX(4px); 
        }

        /* 正在播放狀態 */
        .song-item.active { 
            background-color: rgba(168, 199, 224, 0.1); 
            border-color: rgba(168, 199, 224, 0.2);
            color: #A8C7E0; 
            font-weight: 600; 
            border-left: 4px solid #A8C7E0; 
            padding-left: 16px; 
        }

        /* ==========================================
           五、RWD 手機版適應
        ========================================== */
        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .playlist-box { padding: 20px; }
            .player-header { padding: 16px; top: 10px; }
            .song-item { padding: 14px 16px; font-size: 14px; }
        }

    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← 返回主目錄</a>
    <h1>📁 Stagea 2-1</h1>

    <div class="playlist-box">
        <div class="player-header">
            <span id="now-playing">請點擊下方歌曲播放...</span>
            <audio id="main-player" controls>
                <source src="" type="audio/wav">
            </audio>
        </div>

        <div class="song-list">
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_065_全新的一天.wav', '065 全新的一天')">065 全新的一天</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_066_1集合探險隊.wav', '066-1 集合探險隊')">066-1 集合探險隊</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_066_2集合探險隊.wav', '066-2 集合探險隊')">066-2 集合探險隊</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_067_快樂的大象.wav', '067 快樂的大象')">067 快樂的大象</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_068_出發的早晨.wav', '068 出發的早晨')">068 出發的早晨</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_069_吃.wav', '069 吃')">069 吃</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_070_青蛙之歌.wav', '070 青蛙之歌')">070 青蛙之歌</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_071_我是國王!.wav', '071 我是國王!')">071 我是國王!</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_072_神奇的鞋匠.wav', '072 神奇的鞋匠')">072 神奇的鞋匠</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_073_暹羅.wav', '073 暹羅')">073 暹羅</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_074_魔毯.wav', '074 魔毯')">074 魔毯</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_075_大象拔河.wav', '075 大象拔河')">075 大象拔河</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_076_鯨魚的噴嚏.wav', '076 鯨魚的噴嚏')">076 鯨魚的噴嚏</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_077_下次再會!.wav', '077 下次再會!')">077 下次再會!</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_078_草莓的Minuet.WAV', '078 草莓的Minuet')">078 草莓的Minuet</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_079_Clock.wav', '079 Clock')">079 Clock</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_080_快樂的進行曲!.wav', '080 快樂的進行曲!')">080 快樂的進行曲!</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_081_啄木鳥.wav', '081 啄木鳥')">081 啄木鳥</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_082_雲霄飛車.wav', '082 雲霄飛車')">082 雲霄飛車</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_084_小小廚師.wav', '084 小小廚師')">084 小小廚師</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_086_Duck.wav', '086 Duck')">086 Duck</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_087_袋鼠一家跳跳跳.wav', '087 袋鼠一家跳跳跳')">087 袋鼠一家跳跳跳</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_097_1雷鳴與閃電.WAV', '097-1 雷鳴與閃電')">097-1 雷鳴與閃電</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-1/2-1_097_2快樂的五指朋友.wav', '097-2 快樂的五指朋友')">097-2 快樂的五指朋友</button>
        </div>
    </div>
</div>

<script>
    function playMusic(url, name) {
        const player = document.getElementById('main-player');
        const text = document.getElementById('now-playing');
        const allButtons = document.querySelectorAll('.song-item');
        
        // 1. 取消所有按鈕的變色，並找出現在點擊的這首幫它變色
        allButtons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText === name) {
                btn.classList.add('active');
            }
        });
        
        // 2. 切換來源並播放
        player.src = url;
        text.innerText = "▶️ 正在播放：" + name;
        
        // 載入並播放
        player.load();
        player.play().catch(e => {
            console.log("播放失敗，可能是瀏覽器限制自動播放:", e);
        });
    }

    // 🌟 監聽「音樂播完 (ended)」事件，達成自動跳下一首
    document.getElementById('main-player').addEventListener('ended', function() {
        const currentActive = document.querySelector('.song-item.active');
        
        if (currentActive && currentActive.nextElementSibling) {
            currentActive.nextElementSibling.click();
        } else {
            document.getElementById('now-playing').innerText = "⏹️ 播放清單已結束";
        }
    });
</script>

</body>
</html>
