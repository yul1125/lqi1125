<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬音樂播放器</title>
    <style>
        body {
            background-color: #121212;
            font-family: -apple-system, sans-serif;
            color: #ffffff;
            padding: 20px;
            margin: 0;
        }
        h1, h2 { text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #4facfe;
        }
        .card h3 { margin-top: 0; color: #e0e0e0; }
        .link-btn {
            display: inline-block;
            background-color: #4facfe;
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }
        .link-btn:hover { background-color: #ffffff; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 我的音樂播放清單</h1>

    <h2>📂 我的專屬音檔</h2>
    <div class="grid">
        <div class="card">
            <h3>Stagea 音樂 1</h3>
            <audio controls>
                <source src="Music for Stagea/這裡改成你的檔名.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <hr style="border-color: #333; margin: 40px 0;">

    <h2>🔗 線上課程連結</h2>
    <div class="grid">
        <div class="card">
            <h3>3歲小幼班 1</h3>
            <a href="https://yms.ymm.co.jp/media/index.html?page=9003aff1958fe0e5869b0076831e9ad2" target="_blank" class="link-btn">前往播放</a>
        </div>
        <div class="card">
            <h3>幼幼班-音樂是我的好朋友</h3>
            <a href="https://yms.ymm.co.jp/media/index.html?page=e10e6e6111a0007bc70e48c1682b5103" target="_blank" class="link-btn">前往播放</a>
        </div>
    </div>
</div>

</body>
</html>
