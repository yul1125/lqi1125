<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagea 2-2 音樂庫</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           一、視覺核心：漸層背景與色彩系統
        ========================================== */
        body {
            background: linear-gradient(180deg, #0f1115 0%, #0c0e12 100%);
            background-attachment: fixed; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            color: #e6e6e6;
            margin: 0;
            padding: 48px 32px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto;
        }

        /* ==========================================
           二、字體層級系統與導航按鈕
        ========================================== */
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 1px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .back-btn { 
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e6e6e6; 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            margin-bottom: 24px; 
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .back-btn:hover { 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff; 
            transform: translateX(-4px); 
        }

        /* ==========================================
           三、琉璃播放器區塊
        ========================================== */
        .playlist-box { 
            background: rgba(26, 29, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            padding: 32px; 
        }

        .player-header { 
            position: sticky; 
            top: 20px; 
            background: rgba(26, 29, 36, 0.85); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px; 
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #now-playing { 
            color: #A8C7E0; 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 12px; 
            display: block; 
            letter-spacing: 0.5px;
        }

        audio { 
            width: 100%; 
            border-radius: 8px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1E2128; 
        }

        /* ==========================================
           四、極簡列表按鈕
        ========================================== */
        .song-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        .song-item { 
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            background-color: transparent; 
            border: 1px solid transparent;
            border-radius: 10px;
            color: #e6e6e6;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .song-item:hover { 
            background-color: rgba(255, 255, 255, 0.03); 
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateX(4px); 
        }

        /* 正在播放狀態 */
        .song-item.active { 
            background-color: rgba(168, 199, 224, 0.1); 
            border-color: rgba(168, 199, 224, 0.2);
            color: #A8C7E0; 
            font-weight: 600; 
            border-left: 4px solid #A8C7E0; 
            padding-left: 16px; 
        }

        /* ==========================================
           五、RWD 手機版適應
        ========================================== */
        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .playlist-box { padding: 20px; }
            .player-header { padding: 16px; top: 10px; }
            .song-item { padding: 14px 16px; font-size: 14px; }
        }

    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← 返回主目錄</a>
    <h1>📁 Stagea 2-2</h1>

    <div class="playlist-box">
        <div class="player-header">
            <span id="now-playing">請點擊下方歌曲播放...</span>
            <audio id="main-player" controls>
                <source src="" type="audio/wav">
            </audio>
        </div>

        <div class="song-list">
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_098_滴.wav', '098 滴')">098 滴</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_099_松鼠的搖籃曲.wav', '099 松鼠的搖籃曲')">099 松鼠的搖籃曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_100_宇宙之旅.wav', '100 宇宙之旅')">100 宇宙之旅</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_101_蜜蜂進行曲.wav', '101 蜜蜂進行曲')">101 蜜蜂進行曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_102_Wriggle%20Time.WAV', '102 Wriggle Time')">102 Wriggle Time</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_103_土撥鼠大掃除.wav', '103 土撥鼠大掃除')">103 土撥鼠大掃除</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_104_故事.wav', '104 故事')">104 故事</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_105_布穀鳥.wav', '105 布穀鳥')">105 布穀鳥</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_106_太陽公公捉迷藏.wav', '106 太陽公公捉迷藏')">106 太陽公公捉迷藏</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_107_來Mambo.WAV', '107 來Mambo')">107 來Mambo</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_108_廟會.wav', '108 廟會')">108 廟會</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_109_夜空的Party.wav', '109 夜空的Party')">109 夜空的Party</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_110_愛打鼓.wav', '110 愛打鼓')">110 愛打鼓</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_111_精靈的故事.wav', '111 精靈的故事')">111 精靈的故事</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_112_可愛的圓舞曲.wav', '112 可愛的圓舞曲')">112 可愛的圓舞曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_113_太空船.wav', '113 太空船')">113 太空船</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_114_孩子們.wav', '114 孩子們')">114 孩子們</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_115_昨Evening%20Star.WAV', '115 昨Evening Star')">115 昨Evening Star</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_118_山賊之歌.wav', '118 山賊之歌')">118 山賊之歌</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_128_愛的讚禮.wav', '128 愛的讚禮')">128 愛的讚禮</button>
        </div>
    </div>
</div>

<script>
    function playMusic(url, name) {
        const player = document.getElementById('main-player');
        const text = document.getElementById('now-playing');
        const allButtons = document.querySelectorAll('.song-item');
        
        // 1. 取消所有按鈕的變色，並找出現在點擊的這首幫它變色
        allButtons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText === name) {
                btn.classList.add('active');
            }
        });
        
        // 2. 切換來源並播放
        player.src = url;
        text.innerText = "▶️ 正在播放：" + name;
        
        // 載入並播放
        player.load();
        player.play().catch(e => {
            console.log("播放失敗，可能是瀏覽器限制自動播放:", e);
        });
    }

    // 🌟 監聽「音樂播完 (ended)」事件，達成自動跳下一首
    document.getElementById('main-player').addEventListener('ended', function() {
        const currentActive = document.querySelector('.song-item.active');
        
        if (currentActive && currentActive.nextElementSibling) {
            currentActive.nextElementSibling.click();
        } else {
            document.getElementById('now-playing').innerText = "⏹️ 播放清單已結束";
        }
    });
</script>

</body>
</html>
