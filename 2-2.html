<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagea 2-2 音樂庫</title>
    <style>
        body { background-color: #121212; font-family: sans-serif; color: #ffffff; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        .back-btn { display: inline-block; background-color: #333; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .back-btn:hover { background-color: #ffffff; color: black; }
        .playlist-box { background-color: #1e1e1e; border-radius: 12px; border: 1px solid #333; padding: 20px; }
        .player-header { position: sticky; top: 0; background-color: #1e1e1e; padding-bottom: 15px; border-bottom: 2px solid #4facfe; margin-bottom: 15px; z-index: 10; }
        #now-playing { color: #4facfe; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; display: block; }
        audio { width: 100%; border-radius: 8px; }
        
        .song-list { list-style: none; padding: 0; margin: 0; }
        .song-item { 
            width: 100%;
            text-align: left;
            padding: 15px;
            margin-bottom: 8px;
            background-color: #252525;
            border: none;
            border-radius: 8px;
            color: #4facfe;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .song-item:hover { background-color: #333; color: #ffffff; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">⬅️ 返回主目錄</a>
    <h1>📂 Stagea 2-2 音樂庫</h1>

    <div class="playlist-box">
        <div class="player-header">
            <span id="now-playing">請點擊下方歌曲播放...</span>
            <audio id="main-player" controls>
                <source src="" type="audio/wav">
            </audio>
        </div>

        <div class="song-list">
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_098_滴.wav', '098 滴')">098 滴</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_099_松鼠的搖籃曲.wav', '099 松鼠的搖籃曲')">099 松鼠的搖籃曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_100_宇宙之旅.wav', '100 宇宙之旅')">100 宇宙之旅</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_101_蜜蜂進行曲.wav', '101 蜜蜂進行曲')">101 蜜蜂進行曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_102_Wriggle%20Time.WAV', '102 Wriggle Time')">102 Wriggle Time</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_103_土撥鼠大掃除.wav', '103 土撥鼠大掃除')">103 土撥鼠大掃除</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_104_故事.wav', '104 故事')">104 故事</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_105_布穀鳥.wav', '105 布穀鳥')">105 布穀鳥</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_106_太陽公公捉迷藏.wav', '106 太陽公公捉迷藏')">106 太陽公公捉迷藏</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_107_來Mambo.WAV', '107 來Mambo')">107 來Mambo</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_108_廟會.wav', '108 廟會')">108 廟會</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_109_夜空的Party.wav', '109 夜空的Party')">109 夜空的Party</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_110_愛打鼓.wav', '110 愛打鼓')">110 愛打鼓</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_111_精靈的故事.wav', '111 精靈的故事')">111 精靈的故事</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_112_可愛的圓舞曲.wav', '112 可愛的圓舞曲')">112 可愛的圓舞曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_113_太空船.wav', '113 太空船')">113 太空船</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_114_孩子們.wav', '114 孩子們')">114 孩子們</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_115_昨Evening%20Star.WAV', '115 昨Evening Star')">115 昨Evening Star</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_118_山賊之歌.wav', '118 山賊之歌')">118 山賊之歌</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/2-2/2-2_128_愛的讚禮.wav', '128 愛的讚禮')">128 愛的讚禮</button>
        </div>
    </div>
</div>

<script>
    function playMusic(url, name) {
        const player = document.getElementById('main-player');
        const text = document.getElementById('now-playing');
        
        player.src = url;
        text.innerText = "▶️ 正在播放：" + name;
        
        player.load();
        player.play().catch(e => {
            console.log("播放失敗:", e);
        });
    }
</script>

</body>
</html>
