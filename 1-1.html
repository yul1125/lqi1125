<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagea 1-1 音樂庫</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           一、視覺核心：漸層背景與色彩系統 (與首頁統一)
        ========================================== */
        body {
            background: linear-gradient(180deg, #0f1115 0%, #0c0e12 100%);
            background-attachment: fixed; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            color: #e6e6e6;
            margin: 0;
            padding: 48px 32px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; /* 音樂播放頁面稍窄一點，視覺更集中 */
            margin: 0 auto;
        }

        /* ==========================================
           二、字體層級系統與導航按鈕
        ========================================== */
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 1px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .back-btn { 
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            color: #e6e6e6; 
            text-decoration: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            margin-bottom: 24px; 
            font-weight: 500;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .back-btn:hover { 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff; 
            transform: translateX(-4px); /* 輕微向左移，暗示返回 */
        }

        /* ==========================================
           三、琉璃播放器區塊
        ========================================== */
        .playlist-box { 
            background: rgba(26, 29, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            padding: 32px; 
        }

        .player-header { 
            position: sticky; 
            top: 20px; /* 滑動時會吸附在頂部 */
            background: rgba(26, 29, 36, 0.85); /* 稍微不透明一點 */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px; 
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #now-playing { 
            color: #A8C7E0; /* 柔和藍點綴色 */
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 12px; 
            display: block; 
            letter-spacing: 0.5px;
        }

        /* 自訂 HTML5 audio 控制條外觀 (盡量融入深色背景) */
        audio { 
            width: 100%; 
            border-radius: 8px;
            outline: none;
        }
        /* 隱藏預設背景，讓它更融入 */
        audio::-webkit-media-controls-panel {
            background-color: #1E2128; 
        }

        /* ==========================================
           四、極簡列表按鈕
        ========================================== */
        .song-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            gap: 8px; /* 列表間距 */
        }

        .song-item { 
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            background-color: transparent; /* 預設透明 */
            border: 1px solid transparent;
            border-radius: 10px;
            color: #e6e6e6;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .song-item:hover { 
            background-color: rgba(255, 255, 255, 0.03); 
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateX(4px); /* 輕微右移 */
        }

        /* 🌟 正在播放的那首歌：亮藍色高光狀態 */
        .song-item.active { 
            background-color: rgba(168, 199, 224, 0.1); 
            border-color: rgba(168, 199, 224, 0.2);
            color: #A8C7E0; 
            font-weight: 600; 
            border-left: 4px solid #A8C7E0; /* 左側重點線 */
            padding-left: 16px; /* 扣掉 border-left 的寬度，保持文字對齊 */
        }

        /* RWD: 手機版適應 */
        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .playlist-box { padding: 20px; }
            .player-header { padding: 16px; top: 10px; }
            .song-item { padding: 14px 16px; font-size: 14px; }
        }

    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← 返回主目錄</a>
    <h1>📁 Stagea 1-1</h1>

    <div class="playlist-box">
        <div class="player-header">
            <span id="now-playing">請點擊下方歌曲播放...</span>
            <audio id="main-player" controls>
                <source src="" type="audio/wav">
            </audio>
        </div>

        <div class="song-list">
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_01_音樂真是好奇妙!.wav', '01 音樂真是好奇妙!')">01 音樂真是好奇妙!</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_02_活力進行曲.wav', '02 活力進行曲')">02 活力進行曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_03_在原玩.wav', '03 在原玩')">03 在原玩</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_04_蒲公英.wav', '04 蒲公英')">04 蒲公英</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_05_散進行曲.wav', '05 散進行曲')">05 散進行曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_06_Do,%20Re,%20Mi,小蝌蚪.wav', '06 Do, Re, Mi,小蝌蚪')">06 Do, Re, Mi,小蝌蚪</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_07_海豚.wav', '07 海豚')">07 海豚</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_08_鏡子之舞.wav', '08 鏡子之舞')">08 鏡子之舞</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_09_小兔子與大象.wav', '09 小兔子與大象')">09 小兔子與大象</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_10_玩具.wav', '10 玩具')">10 玩具</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_11_青蛙呱呱呱.wav', '11 青蛙呱呱呱')">11 青蛙呱呱呱</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_12_好朋友樂隊.wav', '12 好朋友樂隊')">12 好朋友樂隊</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_13_Crabs海灘.WAV', '13 Crabs海灘')">13 Crabs海灘</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_14_在海玩.wav', '14 在海玩')">14 在海玩</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_15_Do,%20Re,%20Mi,小青蛙.wav', '15 Do, Re, Mi,小青蛙')">15 Do, Re, Mi,小青蛙</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_16_哇!嚇一跳.wav', '16 哇!嚇一跳')">16 哇!嚇一跳</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_17_Copying好好玩.WAV', '17 Copying好好玩')">17 Copying好好玩</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_18_輕飄飄的泡泡.wav', '18 輕飄飄的泡泡')">18 輕飄飄的泡泡</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_19_吉格舞曲.wav', '19 吉格舞曲')">19 吉格舞曲</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_20_蟲蟲合唱團.wav', '20 蟲蟲合唱團')">20 蟲蟲合唱團</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_21_歡迎光臨!動物親子餐廳.wav', '21 歡迎光臨!動物親子餐廳')">21 歡迎光臨!動物親子餐廳</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_22_去機器人樂園遠足.wav', '22 去機器人樂園遠足')">22 去機器人樂園遠足</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_23_船歌.wav', '23 船歌')">23 船歌</button>
            <button class="song-item" onclick="playMusic('Music%20for%20Stagea/1-1/1-1_24_小夜曲.wav', '24 小夜曲')">24 小夜曲</button>
        </div>
    </div>
</div>

<script>
    // 🌟 升級版：支援按鈕變色功能
    function playMusic(url, name) {
        const player = document.getElementById('main-player');
        const text = document.getElementById('now-playing');
        const allButtons = document.querySelectorAll('.song-item');
        
        // 1. 取消所有按鈕的變色，並找出現在點擊的這首幫它變色
        allButtons.forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText === name) {
                btn.classList.add('active');
            }
        });
        
        // 2. 切換來源並播放
        player.src = url;
        text.innerText = "▶️ 正在播放：" + name;
        
        // 載入並播放
        player.load();
        player.play().catch(e => {
            console.log("播放失敗，可能是瀏覽器限制自動播放:", e);
        });
    }

    // 🌟 新增：監聽「音樂播完 (ended)」事件，達成自動跳下一首
    document.getElementById('main-player').addEventListener('ended', function() {
        // 找到現在正在播放（有 active 標記）的按鈕
        const currentActive = document.querySelector('.song-item.active');
        
        // 如果有找到，而且它下面還有另一個按鈕 (nextElementSibling)
        if (currentActive && currentActive.nextElementSibling) {
            // 用程式自動「點」下一首歌
            currentActive.nextElementSibling.click();
        } else {
            // 如果已經是最後一首了
            document.getElementById('now-playing').innerText = "⏹️ 播放清單已結束";
        }
    });
</script>

</body>
</html>
